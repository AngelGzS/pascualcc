services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: pascualcc-ts
    hostname: pascualcc-trading
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - ts_state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_EXTRA_ARGS=--exit-node=${TS_EXIT_NODE} --accept-dns=false
      - TS_USERSPACE=false
      - TS_STATE_DIR=/var/lib/tailscale
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    healthcheck:
      test: ["CMD-SHELL", "tailscale status | grep -q 'offers exit node'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  paper-trading:
    build: .
    container_name: pascualcc-paper
    restart: unless-stopped
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_healthy
    volumes:
      - paper_state:/app/data/paper
      - paper_logs:/app/logs
    environment:
      - PAIRS=BTCUSDT
      - CAPITAL=10000
      - RISK=0.02
      - RR_TARGET=2.5
      - STRATEGY=orb
      - PORT=8082
      - LOG_LEVEL=INFO

volumes:
  paper_state:
  paper_logs:
  ts_state:
